<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DET 口语复习 · 看图 &amp; 阅读说话</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>DET 口语复习</h1>
      <p>
        看图说话 / 阅读说话 · 按难度筛选 · 模拟 90 秒 · 英文转写（不保存）· 展开参考翻译、范文与模板
      </p>
    </header>

    <main>
      <div id="load-err" class="hint error hidden"></div>

      <section id="view-list" class="view-list">
        <div class="toolbar">
          <div class="kind-tabs" id="kind-tabs" role="tablist" aria-label="题型"></div>
          <div class="diff-tabs" id="diff-tabs" role="tablist" aria-label="难度筛选"></div>
          <div class="actions">
            <button type="button" class="btn btn-primary" id="btn-random">随机一题</button>
          </div>
        </div>
        <div id="grid" class="grid"></div>
        <div id="empty" class="empty-state hidden">该难度下暂无题目</div>
      </section>

      <section id="view-exam" class="view-exam hidden">
        <div class="toolbar">
          <button type="button" class="btn btn-ghost" id="btn-back">← 返回列表</button>
          <div class="actions">
            <button type="button" class="btn btn-primary" id="btn-start">开始作答（90s）</button>
            <button type="button" class="btn btn-ghost hidden" id="btn-stop">结束</button>
          </div>
        </div>

        <p class="hint" id="stt-hint"></p>

        <div class="exam-image-wrap" id="exam-image-wrap">
          <img id="exam-img" alt="题目配图" width="800" height="600" />
        </div>

        <div id="exam-prompt-wrap" class="exam-prompt-wrap hidden">
          <h2 class="block-label">题目（英文）</h2>
          <div id="exam-prompt" class="exam-prompt"></div>
        </div>

        <div class="timer-row">
          <div>
            <span class="badge" id="exam-badge"></span>
            <span style="margin-left: 0.5rem; color: var(--muted); font-size: 0.9rem"
              >题号 <strong id="exam-id"></strong
            ></span>
          </div>
          <div class="timer" id="timer">1:30</div>
        </div>

        <h2 id="transcript-heading" class="block-label" style="margin-top: 0">实时英文转写</h2>
        <div id="transcript" class="transcript-box placeholder">
          点击「开始作答」后允许麦克风，用英语描述图片；下方为浏览器语音识别结果（仅供参考，不录音存档）。
        </div>
        <p class="hint" id="mic-hint"></p>

        <details class="sample hidden" id="translate-wrap">
          <summary>参考翻译</summary>
          <div class="sample-body" id="translate-text"></div>
        </details>

        <details class="sample" id="sample-wrap">
          <summary>参考范文</summary>
          <div class="sample-body" id="sample-text"></div>
        </details>

        <details class="sample hidden" id="template-wrap">
          <summary>答题模板</summary>
          <div class="sample-body template-body" id="template-text"></div>
        </details>
      </section>
    </main>

    <footer>个人复习用 · 建议使用桌面版 Chrome 以获得英文语音识别支持</footer>

    <script src="assets/app.js" type="module"></script>
  </body>
</html>
